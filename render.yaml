services:
  - type: web
    name: dajo-3-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
    autoDeploy: true
    healthCheckPath: /api/health
